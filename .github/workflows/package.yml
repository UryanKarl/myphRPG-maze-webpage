name: Package and Release

on:
  push:
    paths:
      - 'windownloads/**'   # 确保这个文件夹名和你仓库里的一致
    branches: [ main ]      # 确保这个分支名和你的一致，通常是 main 或 master

permissions:
  contents: write          # 显式授予写入权限，用于创建 Release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Zip game source files
        run: |
          zip -r MyPhRPG-maze-win.zip windownloads/
      
      - name: Create Release and upload zip
        uses: softprops/action-gh-release@v1
        with:
          tag_name: continuous-build
          name: Continuous Build
          files: MyPhRPG-maze-win.zip
          body: |
            自动打包的游戏文件，点击下方“Assets”下载。
          draft: false
          prerelease: true  # 先设为预发布版本，更安全